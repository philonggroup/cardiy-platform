<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CARDIY - Offline</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #0F172A; color: #F1F5F9; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; text-align: center; }
    .icon { font-size: 80px; margin-bottom: 24px; }
    h1 { font-size: 28px; font-weight: 900; color: #F59E0B; margin-bottom: 12px; }
    p { color: #94A3B8; font-size: 16px; line-height: 1.6; max-width: 300px; margin-bottom: 32px; }
    .btn { background: linear-gradient(135deg, #F59E0B, #D97706); color: #0F172A; font-weight: 700; padding: 16px 32px; border-radius: 12px; border: none; font-size: 16px; cursor: pointer; }
    .hotline { background: #1E293B; border: 1px solid #334155; border-radius: 16px; padding: 20px; margin-top: 24px; width: 100%; max-width: 300px; }
    .hotline-number { color: #F59E0B; font-size: 24px; font-weight: 900; }
    .hotline-label { color: #94A3B8; font-size: 14px; }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>Không có kết nối</h1>
  <p>Vui lòng kiểm tra kết nối internet và thử lại. Một số tính năng vẫn hoạt động offline.</p>
  <button class="btn" onclick="window.location.reload()">🔄 Thử lại</button>
  <div class="hotline">
    <div class="hotline-label">Cần hỗ trợ khẩn cấp?</div>
    <a href="tel:19001234" class="hotline-number" style="text-decoration:none; display:block; margin-top:8px;">📞 1900 1234</a>
    <div class="hotline-label" style="margin-top:4px;">Hotline 24/7</div>
  </div>
</body>
</html>
